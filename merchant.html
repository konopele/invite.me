<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merchant — CodiceFacile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0f0e0c; --paper:#f5f0e8; --cream:#ede7d9; --white:#fff;
      --rust:#c94a2b; --rust-dim:#a63b22; --rust-pale:#fdf0ec;
      --gold:#c9932b; --gold-pale:#fdf6e8;
      --sage:#3d6b4a; --sage-pale:#eaf5ee;
      --red:#dc2626; --red-pale:#fef2f2;
      --muted:#7a7062; --border:#d5cdc0; --border-strong:#b8b0a5;
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'DM Sans',sans-serif;
      --font-mono:'DM Mono',monospace;
      --ease:cubic-bezier(0.19,1,0.22,1);
      --radius:12px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:15px;line-height:1.5;overflow-x:hidden}

    /* ── NAV ── */
    nav{position:sticky;top:0;z-index:300;background:rgba(245,240,232,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .nav-logo{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--ink);text-decoration:none;letter-spacing:-.5px;flex-shrink:0}
    .nav-logo span{color:var(--rust)}
    .nav-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex:1}
    .nav-breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s}
    .nav-breadcrumb a:hover{color:var(--ink)}
    .nav-breadcrumb .sep{opacity:.35}
    .nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
    .lang-sw{display:flex;background:var(--cream);border:1.5px solid var(--border);border-radius:7px;overflow:hidden}
    .lang-btn{padding:5px 11px;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .15s;border-right:1px solid var(--border);line-height:1.6}
    .lang-btn:last-child{border-right:none}
    .lang-btn.active{background:var(--rust);color:#fff}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:6px;font-family:var(--font-body);font-weight:600;font-size:13px;text-decoration:none;cursor:pointer;border:1.5px solid transparent;transition:all .2s;line-height:1;white-space:nowrap}
    .btn-ghost{color:var(--ink);border-color:var(--border);background:transparent}
    .btn-ghost:hover{border-color:var(--ink)}
    .btn-primary{background:var(--rust);color:#fff;border-color:var(--rust)}
    .btn-primary:hover{background:var(--rust-dim);transform:translateY(-1px)}
    .btn-sm{padding:6px 14px;font-size:12px}
    #nav-auth-logged-out{display:flex;gap:8px;align-items:center}
    #nav-auth-logged-in{display:none;gap:8px;align-items:center}
    .nav-user-avatar{width:30px;height:30px;border-radius:50%;background:var(--rust);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--border);background-size:cover}
    .nav-user-name{font-size:13px;font-weight:600;color:var(--ink)}
    .btn-logout{font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--muted);background:none;border:1.5px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .btn-logout:hover{border-color:var(--rust);color:var(--rust)}

    /* ── MERCHANT HEADER ── */
    .merchant-header{background:var(--ink);padding:44px 40px 40px;position:relative;overflow:hidden}
    .merchant-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(201,74,43,.18) 0%,transparent 55%);pointer-events:none}
    .mh-inner{max-width:1060px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;position:relative;z-index:1}
    .mh-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#5a5248;text-decoration:none;margin-bottom:20px;transition:color .2s;font-weight:500}
    .mh-back:hover{color:var(--paper)}
    .mh-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
    .mh-logo{width:64px;height:64px;background:rgba(255,255,255,.08);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.1)}
    .mh-name{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);font-weight:900;color:var(--paper);letter-spacing:-1.5px;line-height:1;margin-bottom:4px}
    .mh-cat{font-size:11px;color:#5a5248;text-transform:uppercase;letter-spacing:.12em;font-weight:700}
    .mh-badges{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700}
    .badge-v{background:rgba(61,107,74,.25);color:#6ee79a;border:1px solid rgba(61,107,74,.4)}
    .badge-f{background:rgba(201,147,43,.2);color:#f0c060;border:1px solid rgba(201,147,43,.3)}
    .mh-desc{font-size:14px;color:#8a8278;max-width:540px;line-height:1.7;margin-bottom:18px}
    .mh-website{display:inline-flex;align-items:center;gap:6px;color:#6a6258;font-size:13px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:6px 14px;transition:all .2s}
    .mh-website:hover{border-color:rgba(255,255,255,.22);color:var(--paper)}
    .mh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;min-width:220px}
    .mh-stat{background:rgba(255,255,255,.03);padding:18px 16px;text-align:center}
    .mh-stat-val{font-family:var(--font-display);font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
    .rust{color:var(--rust)} .gold{color:var(--gold)} .sage{color:#6ee79a}
    .mh-stat-key{font-size:10px;color:#5a5248;font-weight:700;text-transform:uppercase;letter-spacing:.08em}

    /* ── SECTION SWITCHER ── */
    .switcher-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0;position:sticky;top:60px;z-index:200}
    .switcher-inner{max-width:1060px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .section-switcher{display:flex;padding:12px 0;gap:4px}
    .sw-tab{
      display:flex;align-items:center;gap:10px;
      padding:12px 28px;border-radius:10px;
      border:2px solid transparent;background:transparent;
      font-family:var(--font-body);font-size:15px;font-weight:700;
      color:var(--muted);cursor:pointer;transition:all .22s var(--ease);
      position:relative;
    }
    .sw-tab:hover{color:var(--ink);background:var(--cream)}
    .sw-tab.active{
      background:var(--ink);color:var(--paper);border-color:var(--ink);
      box-shadow:0 4px 16px rgba(15,14,12,.18);
    }
    .sw-tab.active.promo{background:var(--rust);border-color:var(--rust);box-shadow:0 4px 16px rgba(201,74,43,.28)}
    .sw-tab.active.invite{background:var(--ink);border-color:var(--ink)}
    .sw-icon{font-size:18px;line-height:1}
    .sw-label{}
    .sw-count{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:22px;height:22px;padding:0 6px;
      border-radius:100px;font-size:11px;font-weight:800;font-family:var(--font-mono);
      background:rgba(255,255,255,.18);color:inherit;
    }
    .sw-tab:not(.active) .sw-count{background:var(--cream);color:var(--muted)}
    .switcher-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

    /* Panel visibility */
    .section-panel{display:none;animation:panelIn .28s var(--ease)}
    .section-panel.active{display:block}
    @keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ── PAGE BODY ── */
    .page-body{max-width:1060px;margin:0 auto;padding:36px 40px 60px}

    /* ── PROMO CODES ── */
    .promo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
    .promo-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:all .22s var(--ease);animation:fadeUp .35s var(--ease) both}
    .promo-card:hover{border-color:var(--border-strong);box-shadow:0 6px 24px rgba(15,14,12,.1);transform:translateY(-2px)}
    .promo-card.top-pick{border-color:var(--rust);background:var(--rust-pale)}
    .promo-top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .promo-disc{background:var(--rust);color:#fff;font-size:13px;font-weight:800;padding:5px 13px;border-radius:100px;letter-spacing:.02em}
    .promo-card.top-pick .promo-disc{background:var(--ink)}
    .pbadges{display:flex;gap:4px;flex-wrap:wrap}
    .pbadge{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
    .pbadge-v{background:var(--sage-pale);color:var(--sage)}
    .pbadge-exp{background:#fef3c7;color:#92400e}
    .pbadge-top{background:var(--rust-pale);color:var(--rust);border:1px solid rgba(201,74,43,.2)}
    .promo-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:13px}
    .promo-code-row{display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:8px;padding:9px 12px;border:1px dashed var(--border-strong);margin-bottom:10px}
    .promo-card.top-pick .promo-code-row{background:rgba(201,74,43,.07);border-color:rgba(201,74,43,.3)}
    .promo-code-val{font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:.1em;flex:1;user-select:all}
    .copy-btn{padding:5px 12px;border-radius:5px;border:1.5px solid var(--rust);background:transparent;color:var(--rust);font-family:var(--font-body);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .15s;flex-shrink:0}
    .copy-btn:hover{background:var(--rust);color:#fff}
    .copy-btn.ok{background:var(--sage);border-color:var(--sage);color:#fff}
    .promo-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}
    .expiring-soon{color:#92400e;font-weight:600}

    /* ── INVITE TOOLBAR ── */
    .invite-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
    .inv-sort{display:flex;gap:4px}
    .inv-sort-btn{padding:6px 14px;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
    .inv-sort-btn:hover{border-color:var(--border-strong);color:var(--ink)}
    .inv-sort-btn.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}
    .invite-count-lbl{font-size:12px;color:var(--muted);margin-left:4px}
    .add-btn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;background:var(--rust);color:#fff;border:none;font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0}
    .add-btn:hover{background:var(--rust-dim);transform:translateY(-1px)}

    /* ── INVITE GRID ── */
    .invite-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
    .invite-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .22s var(--ease);display:flex;flex-direction:column;animation:fadeUp .35s var(--ease) both}
    .invite-card:hover{border-color:var(--border-strong);box-shadow:0 6px 24px rgba(15,14,12,.1);transform:translateY(-2px)}
    .invite-card.premium{border-color:var(--gold)}
    .invite-card.premium:hover{box-shadow:0 6px 24px rgba(201,147,43,.18)}

    /* User strip */
    .ic-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--cream)}
    .invite-card.premium .ic-user{background:var(--gold-pale)}
    .ic-av{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--white)}
    .ic-info{flex:1;min-width:0}
    .ic-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ic-date{font-size:11px;color:var(--muted)}
    .ic-badges{display:flex;gap:4px;flex-shrink:0}
    .ub{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
    .ub-pro{background:var(--gold-pale);color:var(--gold);border:1px solid rgba(201,147,43,.3)}
    .ub-top{background:var(--rust-pale);color:var(--rust);border:1px solid rgba(201,74,43,.2)}

    /* Card body */
    .ic-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:10px}

    /* Code field */
    .ic-code-field{display:flex;align-items:stretch;background:var(--cream);border-radius:8px;border:1.5px dashed var(--border-strong);overflow:hidden}
    .invite-card.premium .ic-code-field{background:rgba(201,147,43,.08);border-color:rgba(201,147,43,.4)}
    .ic-code-val{font-family:var(--font-mono);font-size:14px;font-weight:600;letter-spacing:.09em;padding:10px 10px 10px 12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:text;user-select:all;align-self:center}
    .ic-copy{padding:0 16px;background:var(--rust);color:#fff;border:none;font-family:var(--font-body);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;transition:background .15s;flex-shrink:0;align-self:stretch;display:flex;align-items:center}
    .ic-copy:hover{background:var(--rust-dim)}
    .ic-copy.ok{background:var(--sage)}

    /* Bonus row */
    .ic-bonus{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted);background:var(--cream);border-radius:7px;padding:8px 11px;line-height:1.45}
    .invite-card.premium .ic-bonus{background:var(--gold-pale)}
    .ic-bonus-icon{font-size:15px;flex-shrink:0;margin-top:1px}

    /* Action row */
    .ic-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .ic-link-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--ink);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none}
    .ic-link-btn:hover{border-color:var(--border-strong);background:var(--cream)}
    .ic-link-btn:disabled,.ic-link-btn[aria-disabled="true"]{opacity:.35;cursor:not-allowed;pointer-events:none}
    .ic-validate-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .ic-validate-btn:hover{border-color:var(--sage);color:var(--sage);background:var(--sage-pale)}
    .ic-validate-btn.voted-ok{border-color:var(--sage);color:var(--sage);background:var(--sage-pale)}
    .ic-validate-btn.voted-bad{border-color:var(--red);color:var(--red);background:var(--red-pale)}

    /* Vote bar */
    .ic-vote-bar{display:flex;flex-direction:column;gap:4px}
    .vote-track{height:5px;background:var(--cream);border-radius:3px;overflow:hidden}
    .vote-fill{height:100%;background:linear-gradient(90deg,var(--sage),#5aad6e);border-radius:3px;transition:width .55s var(--ease)}
    .vote-labels{display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--muted)}
    .vote-labels .ok{color:var(--sage)} .vote-labels .bad{color:var(--red)}

    /* ── LOAD MORE ── */
    .load-more{text-align:center;margin-top:24px}
    .load-more-btn{padding:11px 32px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;color:var(--ink);transition:all .2s}
    .load-more-btn:hover{border-color:var(--rust);color:var(--rust)}

    /* ── VALIDATE MODAL ── */
    .modal-bg{position:fixed;inset:0;background:rgba(15,14,12,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
    .modal-bg.open{opacity:1;pointer-events:all}
    .modal{background:var(--white);border-radius:20px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 24px 80px rgba(15,14,12,.25);transform:translateY(18px) scale(.97);transition:transform .3s var(--ease)}
    .modal-bg.open .modal{transform:none}
    .modal-head{padding:24px 24px 18px;border-bottom:1px solid var(--border)}
    .modal-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px}
    .modal-preview{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:9px;padding:11px 14px}
    .modal-preview-emoji{font-size:22px}
    .modal-preview-merchant{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:2px}
    .modal-preview-code{font-family:var(--font-mono);font-size:15px;font-weight:700;letter-spacing:.08em}
    .modal-body{padding:20px 24px}
    .modal-q{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink)}
    .modal-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
    .modal-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .18s}
    .modal-opt:hover{background:var(--cream);border-color:var(--border-strong)}
    .modal-opt.sel-ok{border-color:var(--sage);background:var(--sage-pale)}
    .modal-opt.sel-partial{border-color:var(--gold);background:var(--gold-pale)}
    .modal-opt.sel-bad{border-color:var(--red);background:var(--red-pale)}
    .opt-icon{font-size:22px;flex-shrink:0;margin-top:1px}
    .opt-label{font-weight:700;font-size:14px;margin-bottom:2px}
    .opt-sub{font-size:12px;color:var(--muted)}

    .country-sec{margin-bottom:16px;display:none}
    .country-sec.show{display:block}
    .country-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:8px}
    .country-chips{display:flex;flex-wrap:wrap;gap:6px}
    .cchip{padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--muted)}
    .cchip.sel{border-color:var(--gold);background:var(--gold-pale);color:var(--gold);font-weight:700}

    .modal-note{width:100%;min-height:68px;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--font-body);font-size:13px;color:var(--ink);resize:none;outline:none;background:var(--cream);transition:border-color .2s;margin-bottom:16px}
    .modal-note:focus{border-color:var(--rust);background:var(--white)}
    .modal-note::placeholder{color:var(--border-strong)}
    .modal-actions{display:flex;gap:8px}
    .modal-cancel{padding:11px 20px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s}
    .modal-cancel:hover{border-color:var(--border-strong);color:var(--ink)}
    .modal-submit{flex:1;padding:11px;border-radius:8px;background:var(--rust);color:#fff;border:none;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
    .modal-submit:hover{background:var(--rust-dim)}
    .modal-submit:disabled{opacity:.4;cursor:not-allowed}
    .modal-success{display:none;text-align:center;padding:44px 24px}
    .modal-success.show{display:block}
    .success-icon{font-size:52px;margin-bottom:16px}
    .success-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:8px}
    .success-sub{font-size:14px;color:var(--muted)}

    /* ── SHARE MODAL ── */
    .share-type-row{display:flex;gap:6px;margin-bottom:16px}

    .share-type-btn.active{border-color:var(--rust);background:var(--rust-pale);color:var(--rust)}
    .share-field{margin-bottom:13px}
    .share-field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
    .share-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;background:var(--white)}

    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:var(--paper);padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:all .3s var(--ease);pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

function detectLang(){
  const s=localStorage.getItem('cf_lang');
  if(s&&LANGS[s])return s;
  const n=(navigator.language||'en').toLowerCase();
  return n.startsWith('it')?'it':n.startsWith('ru')?'ru':'en';
}
function t(k,...a){ const v=LANGS[S.lang][k]||LANGS.en[k]; return typeof v==='function'?v(...a):v||k; }
function setLang(l){ if(!LANGS[l])return; S.lang=l; localStorage.setItem('cf_lang',l); renderAll(); }
function applyI18n(){
  document.documentElement.lang=S.lang;
  document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===S.lang));
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const v=LANGS[S.lang][el.getAttribute('data-i18n')]; if(v&&typeof v==='string') el.textContent=v; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ const v=LANGS[S.lang][el.getAttribute('data-i18n-ph')]; if(v) el.placeholder=v; });
}

══════════════════════════════════════════════ */
function getInvites(){
  let d=[...IC];
  if(S.sort==='popular') d.sort((a,b)=>b.votes.ok-a.votes.ok);
  else if(S.sort==='newest') d.reverse();
  else if(S.sort==='verified') d=d.filter(c=>{const tot=c.votes.ok+c.votes.bad;return tot>0&&c.votes.ok/tot>=.75;});
  d.sort((a,b)=>b.premium-a.premium);
  return d;
}
function renderInviteGrid(){
  const g=document.getElementById('invite-grid');
  const all=getInvites();
  const shown=all.slice(0,S.shown);
  const lmw=document.getElementById('load-more-wrap');
  lmw.style.display=S.shown>=all.length?'none':'block';
  g.innerHTML='';
  shown.forEach((inv,i)=>{ g.appendChild(buildInviteCard(inv,i)); });
}
function buildInviteCard(inv,i){
  const el=document.createElement('div');
  el.className='invite-card'+(inv.premium?' premium':'');
  el.style.animationDelay=(i*.05)+'s';
  const mv=S.votes[inv.id]||null;
  const okN=inv.votes.ok+(mv==='ok'?1:0);
  const badN=inv.votes.bad+(mv==='bad'?1:0);
  const tot=okN+badN;
  const pct=tot>0?Math.round(okN/tot*100):0;
  const vClass=mv==='ok'?'voted-ok':mv==='bad'?'voted-bad':'';
  const vLabel=mv==='ok'?t('voted_ok'):mv==='bad'?t('voted_bad'):t('validate');
  el.innerHTML=`
    <div class="ic-user">
      <div class="ic-av">${inv.av}</div>
      <div class="ic-info">
        <div class="ic-name">@${inv.user}</div>
        <div class="ic-date">${inv.date}</div>
      </div>
      <div class="ic-badges">
        ${inv.premium?`<span class="ub ub-pro">⭐ Pro</span>`:''}
        ${inv.top?`<span class="ub ub-top">🔥 Top</span>`:''}
      </div>
    </div>
    <div class="ic-body">
      <div class="ic-code-field">
        <div class="ic-code-val" onclick="selText(this)" title="${inv.code}">${inv.code}</div>
        <button class="ic-copy" onclick="doCopy(this,'${inv.code}')">${t('copy')}</button>
      </div>
      ${inv.bonus?`<div class="ic-bonus"><span class="ic-bonus-icon">🎁</span><div><strong>${t('bonus_you')}</strong> ${inv.bonus}&nbsp;&nbsp;<strong>${t('bonus_them')}</strong> ${inv.alsoBonus}</div></div>`:''}
      <div class="ic-actions">
        ${inv.link
          ?`<a class="ic-link-btn" href="${inv.link}" target="_blank" rel="noopener">🔗 ${t('open_link')}</a>`
          :`<span class="ic-link-btn" aria-disabled="true">🔗 ${t('no_link')}</span>`}
        <button class="ic-validate-btn ${vClass}" onclick="openModal('${inv.id}','${inv.code}')">${vLabel}</button>
      </div>
      <div class="ic-vote-bar">
        <div class="vote-track"><div class="vote-fill" style="width:${pct}%"></div></div>
        <div class="vote-labels"><span class="ok">✓ ${okN} ${t('works_lbl')}</span><span class="bad">✗ ${badN} ${t('invalid_lbl')}</span></div>
      </div>
    </div>`;
  return el;
}

function doCopy(btn,code){
  if(!isLoggedIn()){ openAuthGate('copy'); return; }
  navigator.clipboard.writeText(code).then(()=>{
    const orig=btn.textContent; btn.textContent=t('copied'); btn.classList.add('ok');
    showToast(t('toast_copy'));
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('ok'); },1800);
  });
}
function selText(el){
  const r=document.createRange(); r.selectNodeContents(el);
  const s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
}

function submitShareCode(){
  const codeRaw=document.getElementById('share-code-input').value.trim();
  const errEl=document.getElementById('share-code-err');
  if(!codeRaw){
    document.getElementById('share-code-input').classList.add('error');
    errEl.classList.add('show');
    return;
  }
  document.getElementById('share-code-input').classList.remove('error');
  errEl.classList.remove('show');

  const code=codeRaw.toUpperCase();
  const user=Auth.getUser();
  const bonus=document.getElementById('share-bonus-input').value.trim();
  const note=document.getElementById('share-note-input').value.trim();
  const link=shareType==='invite'?document.getElementById('share-link-input').value.trim():'';
  const capturedType=shareType;

  if(capturedType==='promo'){
    PC.unshift({
      code, disc:bonus||'—', desc:note,
      verified:false, top:false, expiring:false,
      expires:'No expiry', uses:0
    });
  } else {
    const userName=user?user.name.toLowerCase().replace(/\s+/g,'_'):'you';
    IC.unshift({
      id:'user_'+Date.now(),
      user:userName,
      av:user?.name?user.name.charAt(0):'😊',
      premium:false, top:false,
      date:'Just now',
      code, link:link||null,
      bonus, alsoBonus:'',
      votes:{ok:0,bad:0}
    });
    S.shown=IC.length;
  }

  document.getElementById('share-modal-form').style.display='none';
  document.getElementById('share-modal-success').classList.add('show');
  applyShareI18n();
  setTimeout(()=>{ closeShareModal(); renderAll(); switchSection(capturedType); },2000);
}

  openShareModal();
}

function renderModalOpts(){
  const opts=[
    {key:'ok', cls:'sel-ok', icon:'✅', lk:'opt_ok', sk:'opt_ok_sub'},
    {key:'partial', cls:'sel-partial', icon:'🌍', lk:'opt_partial', sk:'opt_partial_sub'},
    {key:'bad', cls:'sel-bad', icon:'❌', lk:'opt_bad', sk:'opt_bad_sub'},
  ];
  const wrap=document.getElementById('modal-opts');
  if(!wrap)return;
  wrap.innerHTML='';
  opts.forEach(o=>{
    const d=document.createElement('div');
    d.className='modal-opt'+(modalState.verdict===o.key?' '+o.cls:'');
    d.innerHTML=`<span class="opt-icon">${o.icon}</span><div><div class="opt-label">${t(o.lk)}</div><div class="opt-sub">${t(o.sk)}</div></div>`;
    d.onclick=()=>{
      modalState.verdict=o.key;
      document.getElementById('modal-submit').disabled=false;
      document.getElementById('country-sec').classList.toggle('show',o.key==='partial');
      renderModalOpts();
    };
    wrap.appendChild(d);
  });
}
function renderCountryChips(){
  const wrap=document.getElementById('country-chips');
  if(!wrap)return;
  wrap.innerHTML='';
  COUNTRIES.forEach(c=>{
    const b=document.createElement('button');
    b.className='cchip'+(modalState.countries.includes(c)?' sel':'');
    b.textContent=c;
    b.onclick=()=>{
      modalState.countries=modalState.countries.includes(c)?modalState.countries.filter(x=>x!==c):[...modalState.countries,c];
      renderCountryChips();
    };
    wrap.appendChild(b);
  });
}
function submitVal(){
  if(!modalState.verdict)return;
  S.votes[modalState.id]=modalState.verdict==='bad'?'bad':'ok';
  document.getElementById('modal-form').style.display='none';
  document.getElementById('modal-success').classList.add('show');
  setTimeout(()=>{ closeModal(); renderInviteGrid(); },2000);
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeAuthGate(); closeShareModal(); } });

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
Auth.applyNavState();
renderAll();
</script>
