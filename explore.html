  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0f0e0c; --paper:#f5f0e8; --cream:#ede7d9; --white:#fff;
      --rust:#c94a2b; --rust-dim:#a63b22; --rust-pale:#fdf0ec;
      --gold:#c9932b; --gold-pale:#fdf6e8;
      --sage:#3d6b4a; --sage-pale:#eaf5ee;
      --muted:#7a7062; --border:#d5cdc0; --border-strong:#b8b0a5;
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'DM Sans',sans-serif;
      --font-mono:'DM Mono',monospace;
      --ease:cubic-bezier(0.19,1,0.22,1);
      --radius:14px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:15px;line-height:1.5;overflow-x:hidden}

    /* ── NAV ── */
    nav{position:sticky;top:0;z-index:200;background:rgba(245,240,232,0.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .nav-logo{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--ink);text-decoration:none;letter-spacing:-0.5px;flex-shrink:0}
    .nav-logo span{color:var(--rust)}
    .nav-center{flex:1;max-width:520px;margin:0 auto;position:relative}
    .nav-search-wrap{position:relative}
    .nav-search{width:100%;height:38px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:0 14px 0 38px;font-family:var(--font-body);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s}
    .nav-search:focus{border-color:var(--rust);box-shadow:0 0 0 3px rgba(201,74,43,.1)}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--muted)}
    .nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
    .lang-switcher{display:flex;background:var(--cream);border:1.5px solid var(--border);border-radius:7px;overflow:hidden}
    .lang-btn{padding:5px 11px;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .15s;border-right:1px solid var(--border);line-height:1.6}
    .lang-btn:last-child{border-right:none}
    .lang-btn.active{background:var(--rust);color:#fff}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:6px;font-family:var(--font-body);font-weight:600;font-size:13px;text-decoration:none;cursor:pointer;border:1.5px solid transparent;transition:all .2s;line-height:1}
    .btn-ghost{color:var(--ink);border-color:var(--border);background:transparent}
    .btn-ghost:hover{border-color:var(--ink)}
    .btn-primary{background:var(--rust);color:#fff;border-color:var(--rust)}
    .btn-primary:hover{background:var(--rust-dim);transform:translateY(-1px)}

    /* ── HERO BAR ── */
    .page-hero{background:var(--ink);padding:48px 40px 40px;position:relative;overflow:hidden}
    .page-hero::before{content:'%';position:absolute;right:40px;top:-30px;font-family:var(--font-display);font-size:220px;font-weight:900;color:rgba(255,255,255,.03);line-height:1;pointer-events:none}
    .page-hero-label{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:10px}
    .page-hero h1{font-family:var(--font-display);font-size:clamp(32px,4vw,48px);font-weight:900;color:var(--paper);letter-spacing:-1.5px;line-height:1.05;margin-bottom:12px}
    .page-hero h1 em{color:var(--gold);font-style:italic}
    .page-hero-sub{font-size:15px;color:#8a8278;max-width:500px}

    /* ── TOOLBAR ── */
    .toolbar{padding:20px 40px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--white)}
    .cat-scroll{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none;padding-bottom:2px}
    .cat-scroll::-webkit-scrollbar{display:none}
    .cat-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
    .cat-chip:hover{border-color:var(--border-strong);color:var(--ink)}
    .cat-chip.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}
    .sort-sel{height:34px;padding:0 10px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;cursor:pointer;flex-shrink:0}
    .sort-sel:focus{border-color:var(--rust)}
    .results-lbl{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}

    /* ── GRID ── */
    .grid-wrap{padding:32px 40px 60px;max-width:1400px;margin:0 auto}
    .merchant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

    /* ── MERCHANT CARD ── */
    .merchant-card{
      background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);
      overflow:hidden;cursor:pointer;transition:all .25s var(--ease);
      display:flex;flex-direction:column;text-decoration:none;color:var(--ink);
      animation:fadeUp .4s var(--ease) both;
    }
    .merchant-card:hover{border-color:var(--border-strong);box-shadow:0 8px 32px rgba(15,14,12,.12);transform:translateY(-3px)}
    .merchant-card.featured{border-color:var(--gold)}
    .merchant-card.featured:hover{box-shadow:0 8px 32px rgba(201,147,43,.18)}

    /* Card top band */
    .card-band{height:6px;background:var(--cream)}
    .merchant-card.featured .card-band{background:linear-gradient(90deg,var(--gold),#e8b040)}
    .merchant-card[data-cat="fashion"] .card-band{background:linear-gradient(90deg,#e879a0,#c94a2b)}
    .merchant-card[data-cat="food"] .card-band{background:linear-gradient(90deg,#f97316,#ea580c)}
    .merchant-card[data-cat="travel"] .card-band{background:linear-gradient(90deg,#0ea5e9,#2563eb)}
    .merchant-card[data-cat="mobility"] .card-band{background:linear-gradient(90deg,#10b981,#059669)}
    .merchant-card[data-cat="fintech"] .card-band{background:linear-gradient(90deg,#8b5cf6,#6d28d9)}
    .merchant-card[data-cat="gaming"] .card-band{background:linear-gradient(90deg,#f43f5e,#be123c)}
    .merchant-card[data-cat="tech"] .card-band{background:linear-gradient(90deg,#64748b,#334155)}
    .merchant-card[data-cat="streaming"] .card-band{background:linear-gradient(90deg,#ec4899,#9333ea)}
    .merchant-card[data-cat="energy"] .card-band{background:linear-gradient(90deg,#22c55e,#15803d)}

    .card-body{padding:20px 22px;flex:1;display:flex;flex-direction:column;gap:0}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
    .merchant-logo{width:52px;height:52px;border-radius:12px;background:var(--cream);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
    .card-badges-top{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.03em}
    .badge-verified{background:var(--sage-pale);color:var(--sage)}
    .badge-featured{background:var(--gold-pale);color:var(--gold);border:1px solid rgba(201,147,43,.3)}
    .badge-new{background:#e8f0fe;color:#2563eb}

    .merchant-name{font-weight:800;font-size:17px;letter-spacing:-.3px;margin-bottom:3px}
    .merchant-cat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:10px}
    .merchant-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px;flex:1}

    /* Stats row */
    .card-stats{display:flex;gap:0;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:16px}
    .stat-cell{flex:1;padding:10px 12px;text-align:center;border-right:1px solid var(--border)}
    .stat-cell:last-child{border-right:none}
    .stat-val{font-family:var(--font-display);font-size:18px;font-weight:700;line-height:1;margin-bottom:2px}
    .stat-val.rust{color:var(--rust)}
    .stat-val.gold{color:var(--gold)}
    .stat-val.sage{color:var(--sage)}
    .stat-key{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase}

    /* Best code preview */
    .best-code{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--cream);border-radius:8px;padding:9px 12px}
    .best-code-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
    .best-code-val{font-family:var(--font-mono);font-size:13px;font-weight:500;letter-spacing:.08em;color:var(--ink)}
    .best-code-disc{background:var(--rust);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0}

    /* Card footer */
    .card-footer{padding:12px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .view-all{font-size:13px;font-weight:700;color:var(--rust);display:flex;align-items:center;gap:5px}
    .merchant-card:hover .view-all{gap:8px}
    .trust-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}

    /* ── EMPTY ── */
    .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px}
    .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
    .empty-title{font-family:var(--font-display);font-size:24px;font-weight:700;margin-bottom:8px}
    .empty-sub{font-size:14px;color:var(--muted)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){nav{padding:0 20px}.page-hero,.toolbar,.grid-wrap{padding-left:20px;padding-right:20px}}
    @media(max-width:640px){.merchant-grid{grid-template-columns:1fr}.nav-center{display:none}}
  </style>
</head>

function detectLang(){
  const s=localStorage.getItem('cf_lang');
  if(s&&LANGS[s])return s;
  const n=(navigator.language||'en').toLowerCase();
  return n.startsWith('it')?'it':n.startsWith('ru')?'ru':'en';
}
function t(k){return LANGS[state.lang][k]||LANGS.en[k]||k}
function setLang(l){
  if(!LANGS[l])return;
  state.lang=l;
  localStorage.setItem('cf_lang',l);
  render();
}
function applyStaticI18n(){
  document.title=t('page_title');
  document.documentElement.lang=state.lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(k==='hero_h1') el.innerHTML=t(k);
    else el.textContent=t(k);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder=t(el.getAttribute('data-i18n-ph')); });
  document.querySelectorAll('[data-lang]').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-lang')===state.lang));
  document.querySelectorAll('#sort-sel option[data-i18n]').forEach(o=>o.textContent=t(o.getAttribute('data-i18n')));
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render(){
  applyStaticI18n();
  renderCats();
  renderGrid();
}

function renderCats(){
  const wrap=document.getElementById('cat-scroll');
  wrap.innerHTML='';
  CATS.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cat-chip'+(state.cat===c?' active':'');
    btn.textContent=t('cat_'+c);
    btn.onclick=()=>{ state.cat=c; state.q=''; document.getElementById('search-input').value=''; render(); };
    wrap.appendChild(btn);
  });
}

function getFiltered(){
  let d=[...MERCHANTS];
  if(state.cat!=='all') d=d.filter(m=>m.cat===state.cat);
  if(state.q){const q=state.q.toLowerCase(); d=d.filter(m=>m.name.toLowerCase().includes(q)||m.desc.toLowerCase().includes(q)||m.cat.toLowerCase().includes(q));}
  if(state.sort==='popular') d.sort((a,b)=>(b.codes+b.invites)-(a.codes+a.invites));
  else if(state.sort==='codes') d.sort((a,b)=>b.success-a.success);
  else if(state.sort==='newest') d.sort((a,b)=>b.isNew-a.isNew);
  else if(state.sort==='alpha') d.sort((a,b)=>a.name.localeCompare(b.name));
  d.sort((a,b)=>b.featured-a.featured);
  return d;
}

function renderGrid(){
  const grid=document.getElementById('merchant-grid');
  const filtered=getFiltered();
  document.getElementById('result-count').textContent=filtered.length;
  grid.innerHTML='';
  if(!filtered.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">${t('empty_title')}</div><div class="empty-sub">${t('empty_sub')}</div></div>`;
    return;
  }
  filtered.forEach((m,i)=>{
    const card=document.createElement('a');
    card.className='merchant-card'+(m.featured?' featured':'');
    card.href='merchant.html?id='+m.id;
    card.setAttribute('data-cat',m.cat);
    card.style.animationDelay=(i*.04)+'s';

    const badges=[];
    if(m.verified) badges.push(`<span class="badge badge-verified">✓ ${t('badge_verified')}</span>`);
    if(m.featured) badges.push(`<span class="badge badge-featured">⭐ ${t('badge_featured')}</span>`);
    if(m.isNew) badges.push(`<span class="badge badge-new">✦ ${t('badge_new')}</span>`);

    card.innerHTML=`
      <div class="card-band"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="merchant-logo">${m.emoji}</div>
          <div class="card-badges-top">${badges.join('')}</div>
        </div>
        <div class="merchant-name">${m.name}</div>
        <div class="merchant-cat-label">${t('cat_'+m.cat).replace(/^[^\s]+\s/,'')}</div>
        <div class="merchant-desc">${m.desc}</div>
        <div class="card-stats">
          <div class="stat-cell"><div class="stat-val rust">${m.codes+m.invites}</div><div class="stat-key">${t('stat_codes')}</div></div>
          <div class="stat-cell"><div class="stat-val gold">${m.invites}</div><div class="stat-key">${t('stat_invites')}</div></div>
          <div class="stat-cell"><div class="stat-val sage">${m.success}%</div><div class="stat-key">${t('stat_success')}</div></div>
        </div>
        <div class="best-code">
          <div><div class="best-code-label">${t('best_code_lbl')}</div><div class="best-code-val">${m.bestCode}</div></div>
          <div class="best-code-disc">${m.bestDisc}</div>
        </div>
      </div>
      <div class="card-footer">
        <span class="view-all">${t('view_all')}</span>
        <span class="trust-row">✓ ${t('trust_community')}</span>
      </div>`;
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════
let timer;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(timer);
  timer=setTimeout(()=>{ state.q=e.target.value.trim(); render(); },220);
});
document.getElementById('sort-sel').addEventListener('change',e=>{ state.sort=e.target.value; render(); });

render();
</script>
</body>
</html>
