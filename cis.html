<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>СНГ & постсоветские рынки — CodiceFacile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0f0e0c; --paper:#f5f0e8; --cream:#ede7d9; --white:#fff;
      --rust:#c94a2b; --rust-dim:#a63b22; --rust-pale:#fdf0ec;
      --gold:#c9932b; --gold-pale:#fdf6e8;
      --sage:#3d6b4a; --sage-pale:#eaf5ee;
      --blue:#1d4ed8; --blue-pale:#eff6ff;
      --violet:#6d28d9; --violet-pale:#f5f3ff;
      --muted:#7a7062; --border:#d5cdc0; --border-strong:#b8b0a5;
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'DM Sans',sans-serif;
      --font-mono:'DM Mono',monospace;
      --ease:cubic-bezier(0.19,1,0.22,1);
      --radius:12px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:15px;line-height:1.5;overflow-x:hidden}

    /* ── NAV ── */
    nav{position:sticky;top:0;z-index:200;background:rgba(245,240,232,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .nav-logo{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--ink);text-decoration:none;letter-spacing:-.5px;flex-shrink:0}
    .nav-logo span{color:var(--rust)}
    .nav-links{display:flex;align-items:center;gap:6px;flex:1}
    .nav-link{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .2s}
    .nav-link:hover{color:var(--ink);background:var(--cream)}
    .nav-link.active{color:var(--ink);font-weight:700}
    .nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
    .lang-sw{display:flex;background:var(--cream);border:1.5px solid var(--border);border-radius:7px;overflow:hidden}
    .lang-btn{padding:5px 11px;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .15s;border-right:1px solid var(--border);line-height:1.6}
    .lang-btn:last-child{border-right:none}
    .lang-btn.active{background:var(--rust);color:#fff}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:6px;font-family:var(--font-body);font-weight:600;font-size:13px;text-decoration:none;cursor:pointer;border:1.5px solid transparent;transition:all .2s;line-height:1}
    .btn-ghost{color:var(--ink);border-color:var(--border);background:transparent}
    .btn-ghost:hover{border-color:var(--ink)}
    .btn-primary{background:var(--rust);color:#fff;border-color:var(--rust)}
    .btn-primary:hover{background:var(--rust-dim);transform:translateY(-1px)}
    .btn-sm{padding:6px 14px;font-size:12px}

    /* ── HERO ── */
    .hero{background:var(--ink);padding:52px 40px 44px;position:relative;overflow:hidden}
    .hero::before{content:'СНГ';position:absolute;right:-20px;top:-30px;font-family:var(--font-display);font-size:200px;font-weight:900;color:rgba(255,255,255,.03);line-height:1;pointer-events:none}
    .hero-inner{max-width:1060px;margin:0 auto;position:relative;z-index:1}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:14px}
    .hero-eyebrow::before{content:'';width:20px;height:2px;background:var(--rust);display:block}
    .hero h1{font-family:var(--font-display);font-size:clamp(30px,4.5vw,52px);font-weight:900;color:var(--paper);letter-spacing:-1.5px;line-height:1.08;margin-bottom:14px}
    .hero h1 em{font-style:italic;color:var(--gold)}
    .hero-sub{font-size:15px;color:#8a8278;max-width:560px;line-height:1.65;margin-bottom:28px}

    /* ── REGION SWITCHER ── */
    .region-switcher{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .region-switcher-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#5a5248;margin-right:4px;flex-shrink:0}
    .region-btn{
      display:inline-flex;align-items:center;gap:7px;
      padding:9px 18px;border-radius:10px;
      border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
      font-family:var(--font-body);font-size:13px;font-weight:600;
      color:#8a8278;cursor:pointer;transition:all .22s var(--ease);
      white-space:nowrap;flex-shrink:0;
    }
    .region-btn:hover{border-color:rgba(255,255,255,.22);color:var(--paper);background:rgba(255,255,255,.09)}
    .region-btn.active{
      background:var(--rust);border-color:var(--rust);color:#fff;
      box-shadow:0 4px 16px rgba(201,74,43,.35);
    }
    .region-btn .rflag{font-size:18px;line-height:1}
    .region-btn .rname{font-size:13px}
    .region-btn .rcount{
      font-family:var(--font-mono);font-size:10px;font-weight:800;
      background:rgba(255,255,255,.15);padding:2px 6px;border-radius:100px;
    }
    .region-btn.active .rcount{background:rgba(255,255,255,.25)}

    /* ── STICKY REGION BAR (scrolled) ── */
    .region-bar{
      background:var(--white);border-bottom:1px solid var(--border);
      padding:0 40px;position:sticky;top:60px;z-index:190;
      display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;
    }
    .region-bar::-webkit-scrollbar{display:none}
    .rbar-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:14px 18px;border-bottom:3px solid transparent;
      font-family:var(--font-body);font-size:13px;font-weight:600;
      color:var(--muted);cursor:pointer;background:transparent;border-top:none;border-left:none;border-right:none;
      transition:all .2s;white-space:nowrap;flex-shrink:0;
    }
    .rbar-btn:hover{color:var(--ink)}
    .rbar-btn.active{color:var(--rust);border-bottom-color:var(--rust)}
    .rbar-flag{font-size:16px}
    .rbar-count{font-family:var(--font-mono);font-size:10px;font-weight:800;background:var(--cream);color:var(--muted);padding:2px 6px;border-radius:100px}
    .rbar-count.active-count{background:var(--rust-pale);color:var(--rust)}

    /* ── CATEGORY CHIPS ── */
    .toolbar{padding:20px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;max-width:1100px;margin:0 auto}
    .cat-scroll{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none}
    .cat-scroll::-webkit-scrollbar{display:none}
    .cat-chip{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0}
    .cat-chip:hover{border-color:var(--border-strong);color:var(--ink)}
    .cat-chip.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}
    .sort-sel{height:34px;padding:0 10px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;cursor:pointer;flex-shrink:0}
    .result-lbl{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}

    /* ── SEARCH ── */
    .search-wrap{position:relative;max-width:360px;flex:1}
    .search-input{width:100%;height:36px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:0 12px 0 36px;font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none;transition:border-color .2s}
    .search-input:focus{border-color:var(--rust)}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}

    /* ── MERCHANT GRID ── */
    .grid-wrap{padding:24px 40px 60px;max-width:1140px;margin:0 auto}
    .merchant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

    /* ── MERCHANT CARD ── */
    .merchant-card{
      background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);
      overflow:hidden;text-decoration:none;color:var(--ink);
      display:flex;flex-direction:column;cursor:pointer;
      transition:all .25s var(--ease);animation:fadeUp .4s var(--ease) both;
    }
    .merchant-card:hover{border-color:var(--border-strong);box-shadow:0 8px 32px rgba(15,14,12,.11);transform:translateY(-3px)}
    .merchant-card.featured{border-color:var(--gold)}
    .merchant-card.featured:hover{box-shadow:0 8px 32px rgba(201,147,43,.18)}

    /* Colour band */
    .card-band{height:5px}
    .band-ru{background:linear-gradient(90deg,#dc2626,#1d4ed8)}
    .band-ua{background:linear-gradient(90deg,#1d4ed8,#eab308)}
    .band-kz{background:linear-gradient(90deg,#16a34a,#facc15)}
    .band-by{background:linear-gradient(90deg,#dc2626,#16a34a)}
    .band-ge{background:linear-gradient(90deg,#dc2626,#f97316,#16a34a)}
    .band-az{background:linear-gradient(90deg,#1d4ed8,#dc2626,#16a34a)}
    .band-am{background:linear-gradient(90deg,#dc2626,#1d4ed8,#f97316)}
    .band-uz{background:linear-gradient(90deg,#16a34a,#f8fafc,#dc2626)}
    .band-md{background:linear-gradient(90deg,#1d4ed8,#eab308,#dc2626)}
    .band-lt{background:linear-gradient(90deg,#eab308,#16a34a,#dc2626)}
    .band-lv{background:linear-gradient(90deg,#7f1d1d,#f8fafc,#7f1d1d)}
    .band-ee{background:linear-gradient(90deg,#1c1917,#1d4ed8,#f8fafc)}
    .band-cis{background:linear-gradient(90deg,var(--rust),var(--gold))}

    .card-body{padding:18px 20px;flex:1;display:flex;flex-direction:column;gap:0}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
    .merchant-logo{width:50px;height:50px;border-radius:12px;background:var(--cream);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
    .card-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
    .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:700}
    .badge-v{background:var(--sage-pale);color:var(--sage)}
    .badge-f{background:var(--gold-pale);color:var(--gold);border:1px solid rgba(201,147,43,.3)}
    .badge-ru{background:#fee2e2;color:#dc2626}
    .badge-new{background:var(--blue-pale);color:var(--blue)}

    .merchant-name{font-weight:800;font-size:16px;letter-spacing:-.3px;margin-bottom:2px}
    .merchant-native{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:4px}
    .merchant-regions{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
    .region-pill{padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;background:var(--cream);color:var(--muted)}
    .region-pill.highlighted{background:var(--rust-pale);color:var(--rust)}
    .merchant-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:14px;flex:1}

    /* Stats */
    .card-stats{display:flex;gap:0;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px}
    .stat-cell{flex:1;padding:9px 10px;text-align:center;border-right:1px solid var(--border)}
    .stat-cell:last-child{border-right:none}
    .stat-val{font-family:var(--font-display);font-size:17px;font-weight:700;line-height:1;margin-bottom:2px}
    .stat-val.rust{color:var(--rust)}.stat-val.gold{color:var(--gold)}.stat-val.sage{color:var(--sage)}
    .stat-key{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em}

    .best-code{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--cream);border-radius:8px;padding:8px 12px}
    .best-code-inner{}
    .best-code-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:2px}
    .best-code-val{font-family:var(--font-mono);font-size:13px;font-weight:600;letter-spacing:.08em}
    .best-disc{background:var(--rust);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0}

    .card-footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .view-all{font-size:13px;font-weight:700;color:var(--rust);display:flex;align-items:center;gap:5px;transition:gap .2s}
    .merchant-card:hover .view-all{gap:8px}
    .trust-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}

    /* ── REGION INFO BANNER ── */
    .region-banner{max-width:1060px;margin:0 auto;padding:0 40px 0}
    .region-info{
      margin:20px 0 0;padding:16px 20px;border-radius:12px;
      border-left:4px solid var(--rust);background:var(--white);
      display:flex;align-items:flex-start;gap:14px;
      animation:fadeUp .3s var(--ease);
    }
    .ri-flag{font-size:32px;flex-shrink:0}
    .ri-name{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
    .ri-desc{font-size:13px;color:var(--muted);line-height:1.55;max-width:680px}
    .ri-stats{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
    .ri-stat{font-size:12px;color:var(--muted)}<br>.ri-stat strong{color:var(--ink)}

    /* ── EMPTY ── */
    .empty{grid-column:1/-1;text-align:center;padding:72px 20px}
    .empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
    .empty-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:8px}
    .empty-sub{font-size:14px;color:var(--muted)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:900px){
      nav,.hero,.region-bar,.toolbar,.grid-wrap,.region-banner{padding-left:20px;padding-right:20px}
      .merchant-grid{grid-template-columns:1fr}
      .nav-links{display:none}
    }
    @media(max-width:600px){
      .hero h1{font-size:28px}
      .region-switcher .rname{display:none}
    }
  </style>
</head>

<!-- GRID -->
<div class="grid-wrap">
  <div class="merchant-grid" id="merchant-grid"></div>
</div>

let S = {

  cat: 'all',
  q: '',
  sort: 'popular',
};

/* ══════════════════════════════════════════════
   LANG
══════════════════════════════════════════════ */
function detectLang(){
  const s=localStorage.getItem('cf_lang');
  if(s&&LANGS[s])return s;
  const n=(navigator.language||'en').toLowerCase();
  return n.startsWith('it')?'it':n.startsWith('ru')?'ru':'en';
}
function t(k){ return LANGS[S.lang][k]||LANGS.en[k]||k }
function setLang(l){ if(!LANGS[l])return; S.lang=l; localStorage.setItem('cf_lang',l); renderAll(); }
function applyI18n(){
  document.title=t('page_title');
  document.documentElement.lang=S.lang;
  document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===S.lang));
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    const v=LANGS[S.lang][k];
    if(v&&typeof v==='string'){
      if(['hero_h1'].includes(k)) el.innerHTML=v;
      else el.textContent=v;
    }
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder=t(el.getAttribute('data-i18n-ph')); });
  document.querySelectorAll('#sort-sel option[data-i18n]').forEach(o=>o.textContent=t(o.getAttribute('data-i18n')));
}

/* ══════════════════════════════════════════════
   RENDER ALL
══════════════════════════════════════════════ */
function renderAll(){
  applyI18n();
  renderHeroRegionBtns();
  renderRegionBar();
  renderRegionInfo();
  renderCats();
  renderGrid();
}

function renderHeroRegionBtns(){
  const wrap=document.getElementById('hero-region-btns');
  wrap.style.cssText='display:flex;flex-wrap:wrap;gap:8px';
  wrap.innerHTML='';
  REGIONS.forEach(r=>{
    const btn=document.createElement('button');
    btn.className='region-btn'+(S.region===r.id?' active':'');
    const cnt=r.id==='all'?MERCHANTS.length:(MERCHANTS.filter(m=>m.regions.includes(r.id)).length);
    btn.innerHTML=`<span class="rflag">${r.flag}</span><span class="rname">${r.name[S.lang]||r.name.en}</span><span class="rcount">${cnt}</span>`;
    btn.onclick=()=>{ S.region=r.id; renderAll(); };
    wrap.appendChild(btn);
  });
}

    btn.className='rbar-btn'+(S.region===r.id?' active':'');

/* ══════════════════════════════════════════════
   GRID
══════════════════════════════════════════════ */
function getFiltered(){
  let d=[...MERCHANTS];
  if(S.region!=='all') d=d.filter(m=>m.regions.includes(S.region));
  if(S.cat!=='all') d=d.filter(m=>m.cat===S.cat);
  if(S.q){ const q=S.q.toLowerCase(); d=d.filter(m=>m.name.toLowerCase().includes(q)||m.native.toLowerCase().includes(q)||(m.desc[S.lang]||m.desc.en).toLowerCase().includes(q)); }
  if(S.sort==='popular') d.sort((a,b)=>(b.codes+b.invites)-(a.codes+a.invites));
  else if(S.sort==='codes') d.sort((a,b)=>b.success-a.success);
  else if(S.sort==='alpha') d.sort((a,b)=>a.name.localeCompare(b.name));
  d.sort((a,b)=>b.featured-a.featured);
  return d;
}

function renderGrid(){
  const grid=document.getElementById('merchant-grid');
  const filtered=getFiltered();
  document.getElementById('result-count').textContent=filtered.length;
  grid.innerHTML='';
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">${t('empty_title')}</div><div class="empty-sub">${t('empty_sub')}</div></div>`;
    return;
  }
  filtered.forEach((m,i)=>{
    const card=document.createElement('a');
    card.className='merchant-card'+(m.featured?' featured':'');
    card.href=`merchant.html?id=${m.id}`;
    card.style.animationDelay=(i*.04)+'s';

    // Region pills
    const regionObj=REGIONS.filter(r=>r.id!=='all'&&m.regions.includes(r.id));
    const pillsHtml=regionObj.map(r=>`<span class="region-pill${S.region!=='all'&&m.regions.includes(S.region)?' highlighted':''}">${r.flag} ${r.name[S.lang]||r.name.en}</span>`).join('');

    const badges=[];
    if(m.verified) badges.push(`<span class="badge badge-v">✓ ${t('badge_v')}</span>`);
    if(m.featured) badges.push(`<span class="badge badge-f">⭐ ${t('badge_f')}</span>`);
    if(m.isNew)    badges.push(`<span class="badge badge-new">✦ ${t('badge_new')}</span>`);

    const desc=m.desc[S.lang]||m.desc.en;

    card.innerHTML=`
      <div class="card-band ${m.regions.includes('all')?'band-cis':
        m.regions.length>3?'band-cis':
        m.regions[0]==='ru'?'band-ru':
        m.regions[0]==='ua'?'band-ua':
        m.regions[0]==='kz'?'band-kz':
        m.regions[0]==='ge'?'band-ge':
        m.regions[0]==='by'?'band-by':
        m.regions[0]==='uz'?'band-uz':
        m.regions[0]==='lt'?'band-lt':'band-cis'}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="merchant-logo">${m.emoji}</div>
          <div class="card-badges">${badges.join('')}</div>
        </div>
        <div class="merchant-name">${m.name}</div>
        ${m.native!==m.name?`<div class="merchant-native">${m.native}</div>`:''}
        <div class="merchant-regions">${pillsHtml}</div>
        <div class="merchant-desc">${desc}</div>
        <div class="card-stats">
          <div class="stat-cell"><div class="stat-val rust">${m.codes+m.invites}</div><div class="stat-key">${t('stat_codes')}</div></div>
          <div class="stat-cell"><div class="stat-val gold">${m.invites}</div><div class="stat-key">${t('stat_invites')}</div></div>
          <div class="stat-cell"><div class="stat-val sage">${m.success}%</div><div class="stat-key">${t('stat_success')}</div></div>
        </div>
        <div class="best-code">
          <div class="best-code-inner"><div class="best-code-lbl">${t('best_code_lbl')}</div><div class="best-code-val">${m.bestCode}</div></div>
          <span class="best-disc">${m.bestDisc}</span>
        </div>
      </div>
      <div class="card-footer">
        <span class="view-all">${t('view_all')}</span>
        <span class="trust-badge">✓ ${t('trust_lbl')}</span>
      </div>`;
    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════ */
let timer;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(timer);
  timer=setTimeout(()=>{ S.q=e.target.value.trim(); renderGrid(); },220);
});
document.getElementById('sort-sel').addEventListener('change',e=>{ S.sort=e.target.value; renderGrid(); });

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
